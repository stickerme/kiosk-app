<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0a0a0a" />
<title>sticker.me — Print Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c; --border: #272727;
    --text: #f0f0f0; --muted: #777; --muted2: #444;
    --accent: #C8A96E; --accent-dim: rgba(200,169,110,0.12);
    --success: #4CAF7D; --success-dim: rgba(76,175,125,0.12);
    --error: #E05555; --error-dim: rgba(224,85,85,0.12);
    --warning: #E0A855; --warning-dim: rgba(224,168,85,0.12);
    --info: #5B9BD5; --info-dim: rgba(91,155,213,0.12);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; position: fixed; width: 100%; }
  #app { height: 100%; display: flex; flex-direction: column; min-height: 0; }
  #mainUI { min-height: 0; }

  /* ── Header ── */
  .header { padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .logo { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: var(--accent); }
  .location-name { font-size: 12px; color: var(--muted); }
  .header-stats { display: flex; align-items: center; gap: 12px; }
  .stat-pill { font-size: 12px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 4px 12px; border-radius: 99px; white-space: nowrap; }
  .stat-pill strong { color: var(--text); }
  .live-dot { width: 7px; height: 7px; background: var(--success); border-radius: 50%; animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* ── Tabs ── */
  .tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; padding: 0 16px; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 12px 14px; font-size: 13px; font-weight: 500; color: var(--muted); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; font-family: inherit; transition: color 0.15s; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-count { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 99px; background: var(--surface2); color: var(--muted); }
  .tab.active .tab-count { background: var(--accent-dim); color: var(--accent); }

  /* ── Card list ── */
  .card-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--muted); text-align: center; padding: 40px; }
  .empty-state svg { width: 40px; height: 40px; stroke: var(--muted2); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .empty-state p { font-size: 14px; }
  .empty-state small { font-size: 12px; color: var(--muted2); }

  /* ── Order card ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: border-color 0.2s; }
  .card.ready { border-color: rgba(200,169,110,0.3); }
  .card.printing { border-color: rgba(91,155,213,0.3); }
  .card.failed { border-color: rgba(224,85,85,0.3); }
  .card-top { display: flex; gap: 12px; padding: 14px; }
  .card-thumb { width: 72px; height: 72px; border-radius: 10px; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
  .card-thumb-placeholder { width: 72px; height: 72px; border-radius: 10px; background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .card-thumb-placeholder svg { width: 24px; height: 24px; stroke: var(--muted2); fill: none; stroke-width: 1.5; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .badge-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 99px; white-space: nowrap; }
  .badge-style { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(200,169,110,0.2); }
  .badge-cash { background: var(--warning-dim); color: var(--warning); border: 1px solid rgba(224,168,85,0.2); }
  .badge-paid { background: var(--success-dim); color: var(--success); border: 1px solid rgba(76,175,125,0.2); }
  .badge-group { background: var(--info-dim); color: var(--info); border: 1px solid rgba(91,155,213,0.2); }
  .badge-processing { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .card-addons { font-size: 11px; color: var(--muted); margin-top: 4px; font-style: italic; }

  /* ── Sticker preview ── */
  .sticker-preview-wrap { padding: 0 14px 12px; }
  .sticker-img { width: 100%; max-width: 220px; border-radius: 10px; display: block; margin: 0 auto; cursor: pointer; }
  .sticker-img:active { opacity: 0.85; }

  /* ── Card actions ── */
  .card-actions { display: flex; gap: 8px; padding: 0 14px 14px; flex-wrap: wrap; }
  .btn { padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #0a0a0a; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-success { background: var(--success-dim); color: var(--success); border: 1px solid rgba(76,175,125,0.3); }
  .btn-warning { background: var(--warning-dim); color: var(--warning); border: 1px solid rgba(224,168,85,0.3); }
  .btn-danger { background: var(--error-dim); color: var(--error); border: 1px solid rgba(224,85,85,0.3); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Error notes ── */
  .error-notes { font-size: 11px; color: var(--error); background: var(--error-dim); border: 1px solid rgba(224,85,85,0.2); border-radius: 8px; padding: 8px 10px; margin: 0 14px 10px; line-height: 1.4; word-break: break-word; }

  /* ── Undo toast ── */
  .toast { position: fixed; bottom: 24px; left: 16px; right: 16px; max-width: 520px; margin: 0 auto; padding: 14px 18px; border-radius: 14px; background: var(--surface2); border: 1px solid var(--border); font-size: 14px; font-weight: 500; display: flex; align-items: center; justify-content: space-between; gap: 12px; transform: translateY(100px); opacity: 0; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s; z-index: 100; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .toast-undo { background: var(--accent); color: #0a0a0a; border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; flex-shrink: 0; }

  /* ── Loading state ── */
  #loadingState { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 14px; flex-direction: column; gap: 12px; }
  .spinner { width: 36px; height: 36px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error state ── */
  #errorState { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 40px; gap: 12px; }
  #errorState h2 { font-size: 18px; color: var(--text); }
  #errorState p { font-size: 13px; color: var(--muted); line-height: 1.6; }
  #errorState code { font-size: 12px; color: var(--accent); background: var(--surface); padding: 3px 8px; border-radius: 6px; }
</style>
</head>
<body>
<div id="app">

  <div id="loadingState">
    <div class="spinner"></div>
    <span>Loading dashboard...</span>
  </div>

  <div id="errorState"></div>

  <div id="mainUI" style="display:none;flex-direction:column;height:100%;">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo">sticker.me</div>
        <div class="location-name" id="locationName">Print Dashboard</div>
      </div>
      <div class="header-stats">
        <div class="stat-pill">Today: <strong id="orderCountToday">0</strong></div>
        <div class="live-dot"></div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tabQueue"     onclick="switchTab('queue')">
        Queue <span class="tab-count" id="countQueue">0</span>
      </button>
      <button class="tab"        id="tabPrinting"  onclick="switchTab('printing')">
        Printing <span class="tab-count" id="countPrinting">0</span>
      </button>
      <button class="tab"        id="tabFailed"    onclick="switchTab('failed')">
        Failed <span class="tab-count" id="countFailed">0</span>
      </button>
      <button class="tab"        id="tabCompleted" onclick="switchTab('completed')">
        Completed <span class="tab-count" id="countCompleted">0</span>
      </button>
    </div>

    <!-- Card list -->
    <div class="card-list" id="cardList"></div>

  </div>

  <!-- Undo toast -->
  <div class="toast" id="undoToast">
    <span id="undoMsg">Order completed.</span>
    <button class="toast-undo" id="undoBtn" onclick="undoComplete()">Undo</button>
  </div>

</div>
<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const KIOSK_API    = 'https://kiosk-api-production-0cdc.up.railway.app';
const SUPABASE_URL = 'https://oaghbtvdlouwhwjvrdct.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hZ2hidHZkbG91d2h3anZyZGN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NTM3MzUsImV4cCI6MjA5NzIyOTczNX0.nKBEsBb6rfa_1TPhl5mCXcxNcH_c_gM5aCsgeIyv_ZM';

const STYLE_NAMES = {
  western:'Western', samurai:'Samurai', spy:'Spy', tarot:'Tarot',
  hogwarts:'Hogwarts', royal:'Royal Portrait', ghibli:'Ghibli',
  jojo:"JoJo's Bizarre Adventure", fashion:'Fashion', princess:'Princess'
};

// ─── State ────────────────────────────────────────────────────────────────────
let locationId   = null;
let locationName = '';
let currentTab   = 'queue';
let allOrders    = [];
let pollTimer    = null;
let undoTimer    = null;
let lastCompleted = null; // { orderId, prevPrintStatus }

// ─── Init ─────────────────────────────────────────────────────────────────────
function getLocationId() {
  return new URLSearchParams(window.location.search).get('location');
}

async function init() {
  locationId = getLocationId();
  if (!locationId) {
    showError('No location ID', 'Add <code>?location=scottsdalemall</code> to the URL.');
    return;
  }

  // Fetch location name
  try {
    const res = await fetch(`${KIOSK_API}/location/${encodeURIComponent(locationId)}`);
    if (res.ok) {
      const loc = await res.json();
      locationName = loc.locationName || locationId;
      document.getElementById('locationName').textContent = locationName;
    }
  } catch(e) { /* non-fatal */ }

  document.getElementById('loadingState').style.display = 'none';
  const ui = document.getElementById('mainUI');
  ui.style.display = 'flex';
  ui.style.flexDirection = 'column';
  ui.style.height = '100%';

  await poll();
  pollTimer = setInterval(poll, 5000);
}

// ─── Polling ──────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const today = new Date();
    today.setHours(0,0,0,0);
    const since = today.toISOString();

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/kiosk_orders?location_id=eq.${encodeURIComponent(locationId)}&created_at=gte.${since}&order=created_at.desc&select=*`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    if (!res.ok) return;
    const orders = await res.json();

    // Smart update — only re-render changed cards
    if (JSON.stringify(orders) !== JSON.stringify(allOrders)) {
      allOrders = orders;
      renderAll();
    }
  } catch(e) { /* silent — keep polling */ }
}

// ─── Rendering ────────────────────────────────────────────────────────────────
function renderAll() {
  updateCounts();
  renderTab();
}

function updateCounts() {
  const queue     = allOrders.filter(o => inQueue(o)).length;
  const printing  = allOrders.filter(o => o.print_status === 'PRINTING').length;
  const failed    = allOrders.filter(o => o.status === 'FAILED' && o.print_status !== 'DISMISSED').length;
  const completed = allOrders.filter(o => o.print_status === 'COMPLETED').length;

  document.getElementById('countQueue').textContent     = queue;
  document.getElementById('countPrinting').textContent  = printing;
  document.getElementById('countFailed').textContent    = failed;
  document.getElementById('countCompleted').textContent = completed;
  document.getElementById('orderCountToday').textContent = allOrders.length;
}

function inQueue(o) {
  return o.status === 'GENERATED' && o.print_status === 'READY_TO_PRINT';
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  renderTab();
}

function renderTab() {
  const list = document.getElementById('cardList');
  let orders = [];

  if (currentTab === 'queue') {
    // Queue: READY_TO_PRINT (paid) + PENDING (cash awaiting confirmation)
    orders = allOrders.filter(o =>
      o.status === 'GENERATED' && (o.print_status === 'READY_TO_PRINT' || o.print_status === 'PENDING')
    );
    // Cash-pending first, then READY_TO_PRINT, newest first within each group
    orders.sort((a,b) => {
      if (a.print_status === 'PENDING' && b.print_status !== 'PENDING') return -1;
      if (b.print_status === 'PENDING' && a.print_status !== 'PENDING') return 1;
      return new Date(b.created_at) - new Date(a.created_at);
    });
  } else if (currentTab === 'printing') {
    orders = allOrders.filter(o => o.print_status === 'PRINTING');
  } else if (currentTab === 'failed') {
    orders = allOrders.filter(o => o.status === 'FAILED' && o.print_status !== 'DISMISSED');
  } else if (currentTab === 'completed') {
    orders = allOrders.filter(o => o.print_status === 'COMPLETED');
  }

  // Also show PROCESSING orders in queue tab (still generating)
  if (currentTab === 'queue') {
    const processing = allOrders.filter(o => o.status === 'PROCESSING');
    orders = [...orders, ...processing];
  }

  if (orders.length === 0) {
    list.innerHTML = emptyState(currentTab);
    return;
  }

  list.innerHTML = orders.map(o => renderCard(o)).join('');
}

function emptyState(tab) {
  const msgs = {
    queue:     ['All clear!', 'No orders waiting to print.'],
    printing:  ['Nothing printing', 'Claim an order from the Queue tab.'],
    failed:    ['No failures', 'All orders generated successfully.'],
    completed: ['No completed orders yet', 'Completed orders will appear here.']
  };
  const [title, sub] = msgs[tab] || ['Empty', ''];
  return `<div class="empty-state">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    <p>${title}</p><small>${sub}</small>
  </div>`;
}

function renderCard(order) {
  const isCashPending  = order.print_status === 'PENDING' && order.payment_method === 'cash';
  const isReady        = order.print_status === 'READY_TO_PRINT';
  const isPrinting     = order.print_status === 'PRINTING';
  const isFailed       = order.status === 'FAILED';
  const isProcessing   = order.status === 'PROCESSING';
  const isCompleted    = order.print_status === 'COMPLETED';

  const styleName  = STYLE_NAMES[order.style] || order.style || '—';
  const timeStr    = formatTime(order.created_at);
  const cardClass  = isReady ? 'card ready' : isPrinting ? 'card printing' : isFailed ? 'card failed' : 'card';

  let badges = `<span class="badge badge-style">${styleName}</span>`;
  if (isCashPending) badges += `<span class="badge badge-cash">💵 Cash — Confirm</span>`;
  else if (order.payment_method === 'cash' && order.payment_status === 'CONFIRMED') badges += `<span class="badge badge-paid">✓ Cash Paid</span>`;
  else if (order.payment_status === 'PAID') badges += `<span class="badge badge-paid">✓ Card Paid</span>`;
  if (order.is_group) badges += `<span class="badge badge-group">👥 Group</span>`;
  if (isProcessing) badges += `<span class="badge badge-processing">⏳ Generating...</span>`;

  const thumb = order.photo_url
    ? `<img class="card-thumb" src="${order.photo_url}" alt="Customer photo" loading="lazy" />`
    : `<div class="card-thumb-placeholder"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>`;

  const addonsLine = order.style_addons
    ? `<div class="card-addons">✨ ${order.style_addons}</div>` : '';

  const stickerPreview = order.generated_image_url
    ? `<div class="sticker-preview-wrap"><img class="sticker-img" src="${order.generated_image_url}" alt="Sticker preview" onclick="openSticker('${order.generated_image_url}')" /></div>` : '';

  const errorNotes = isFailed && order.error_notes
    ? `<div class="error-notes">⚠️ ${order.error_notes}</div>` : '';

  // Actions per tab
  let actions = '';

  if (currentTab === 'queue') {
    if (isCashPending) {
      // Cash order — show confirm cash + print buttons
      actions = `
        <button class="btn btn-warning" onclick="confirmCash('${order.order_id}')">✓ Confirm Cash ($9.99)</button>
        ${order.generated_image_url ? `<button class="btn btn-secondary" onclick="openSticker('${order.generated_image_url}')">View →</button>` : ''}
      `;
    } else if (isReady) {
      actions = `
        <button class="btn btn-primary" onclick="claimPrint('${order.order_id}')">🖨 Print This</button>
        ${order.generated_image_url ? `<button class="btn btn-secondary" onclick="openSticker('${order.generated_image_url}')">View →</button>` : ''}
        <a class="btn btn-secondary" href="${order.generated_image_url}" download="${order.order_id}.png">↓ Download</a>
      `;
    } else if (isProcessing) {
      actions = `<button class="btn btn-secondary" disabled>⏳ Generating sticker...</button>`;
    }
  } else if (currentTab === 'printing') {
    actions = `
      <button class="btn btn-success" onclick="markComplete('${order.order_id}')">✓ Mark Done</button>
      ${order.generated_image_url ? `<a class="btn btn-secondary" href="${order.generated_image_url}" download="${order.order_id}.png">↓ Download</a>` : ''}
      <button class="btn btn-secondary" onclick="unclaimPrint('${order.order_id}')">← Back to Queue</button>
    `;
  } else if (currentTab === 'failed') {
    actions = `
      <button class="btn btn-warning" onclick="reprocess('${order.order_id}')">↺ Reprocess</button>
      <button class="btn btn-danger"  onclick="dismiss('${order.order_id}')">Dismiss</button>
    `;
  } else if (currentTab === 'completed') {
    actions = `
      ${order.generated_image_url ? `
        <button class="btn btn-secondary" onclick="claimPrint('${order.order_id}')">🖨 Reprint</button>
        <a class="btn btn-secondary" href="${order.generated_image_url}" download="${order.order_id}.png">↓ Download</a>
      ` : ''}
    `;
  }

  return `
    <div class="card ${cardClass}" id="card-${order.order_id}">
      <div class="card-top">
        ${thumb}
        <div class="card-info">
          <div class="card-name">${escHtml(order.customer_name || 'Guest')}</div>
          <div class="card-meta">${order.order_id} · ${timeStr}</div>
          <div class="badge-row">${badges}</div>
          ${addonsLine}
        </div>
      </div>
      ${stickerPreview}
      ${errorNotes}
      <div class="card-actions">${actions}</div>
    </div>
  `;
}

// ─── Actions ──────────────────────────────────────────────────────────────────

// Confirm cash payment — moves to READY_TO_PRINT
async function confirmCash(orderId) {
  try {
    const res = await fetch(`${KIOSK_API}/confirm-cash`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderId })
    });
    if (!res.ok) throw new Error('Failed');
    await poll();
  } catch(e) {
    alert('Could not confirm cash payment. Try again.');
  }
}

// Claim print — moves to PRINTING (atomic via Supabase PATCH)
async function claimPrint(orderId) {
  try {
    await supabasePatch('kiosk_orders', orderId, { print_status: 'PRINTING', updated_at: new Date().toISOString() });
    await poll();
  } catch(e) {
    alert('Could not claim order. Try again.');
  }
}

// Unclaim — moves back to READY_TO_PRINT
async function unclaimPrint(orderId) {
  try {
    await supabasePatch('kiosk_orders', orderId, { print_status: 'READY_TO_PRINT', updated_at: new Date().toISOString() });
    await poll();
  } catch(e) {
    alert('Could not unclaim order. Try again.');
  }
}

// Mark complete — with 5s undo
async function markComplete(orderId) {
  try {
    lastCompleted = { orderId, prevPrintStatus: 'PRINTING' };
    await supabasePatch('kiosk_orders', orderId, { print_status: 'COMPLETED', updated_at: new Date().toISOString() });
    await poll();
    showUndoToast(orderId);
  } catch(e) {
    alert('Could not mark as complete. Try again.');
  }
}

async function undoComplete() {
  if (!lastCompleted) return;
  hideUndoToast();
  try {
    await supabasePatch('kiosk_orders', lastCompleted.orderId, { print_status: lastCompleted.prevPrintStatus, updated_at: new Date().toISOString() });
    lastCompleted = null;
    await poll();
    switchTab('printing');
  } catch(e) {
    alert('Could not undo. Try again.');
  }
}

// Reprocess failed order
async function reprocess(orderId) {
  try {
    const res = await fetch(`${KIOSK_API}/kiosk-reprocess`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderId })
    });
    if (!res.ok) throw new Error('Failed');
    await poll();
  } catch(e) {
    alert('Could not reprocess. Try again.');
  }
}

// Dismiss failed order
async function dismiss(orderId) {
  try {
    await supabasePatch('kiosk_orders', orderId, { print_status: 'DISMISSED', status: 'DISMISSED', updated_at: new Date().toISOString() });
    await poll();
  } catch(e) {
    alert('Could not dismiss. Try again.');
  }
}

// Open sticker in new tab for full-screen view / printing
function openSticker(url) {
  window.open(url, '_blank');
}

// ─── Supabase helper ──────────────────────────────────────────────────────────
async function supabasePatch(table, orderId, body) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/${table}?order_id=eq.${encodeURIComponent(orderId)}`,
    {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(body)
    }
  );
  if (!res.ok) throw new Error(await res.text());
}

// ─── Undo toast ───────────────────────────────────────────────────────────────
function showUndoToast(orderId) {
  document.getElementById('undoMsg').textContent = `Order ${orderId} marked complete.`;
  document.getElementById('undoToast').classList.add('show');
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(() => {
    hideUndoToast();
    lastCompleted = null;
  }, 5000);
}

function hideUndoToast() {
  document.getElementById('undoToast').classList.remove('show');
  if (undoTimer) clearTimeout(undoTimer);
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showError(title, msg) {
  document.getElementById('loadingState').style.display = 'none';
  const el = document.getElementById('errorState');
  el.style.display = 'flex';
  el.innerHTML = `<h2>${title}</h2><p>${msg}</p>`;
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
