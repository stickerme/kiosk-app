<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0a0a0a" />
<title>sticker.me — Online Fulfillment</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c; --border: #272727;
    --text: #f0f0f0; --muted: #777; --muted2: #444;
    --accent: #C8A96E; --accent-dim: rgba(200,169,110,0.12);
    --success: #4CAF7D; --success-dim: rgba(76,175,125,0.12);
    --error: #E05555; --error-dim: rgba(224,85,85,0.12);
    --warning: #E0A855; --warning-dim: rgba(224,168,85,0.12);
    --info: #5B9BD5; --info-dim: rgba(91,155,213,0.12);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #app { height: 100vh; display: flex; flex-direction: column; }
  #mainUI { display: flex; flex-direction: column; flex: 1; min-height: 0; }

  /* ── Header ── */
  .header { padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .logo { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: var(--accent); }
  .header-sub { font-size: 12px; color: var(--muted); }
  .header-stats { display: flex; align-items: center; gap: 12px; }
  .stat-pill { font-size: 12px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 4px 12px; border-radius: 99px; white-space: nowrap; }
  .stat-pill strong { color: var(--text); }
  .live-dot { width: 7px; height: 7px; background: var(--success); border-radius: 50%; animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* ── Tabs ── */
  .tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; padding: 0 16px; gap: 4px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 12px 14px; font-size: 13px; font-weight: 500; color: var(--muted); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; font-family: inherit; transition: color 0.15s; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-count { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 99px; background: var(--surface2); color: var(--muted); }
  .tab.active .tab-count { background: var(--accent-dim); color: var(--accent); }

  /* ── Card list ── */
  .card-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--muted); text-align: center; padding: 40px; }
  .empty-state svg { width: 40px; height: 40px; stroke: var(--muted2); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .empty-state p { font-size: 14px; }
  .empty-state small { font-size: 12px; color: var(--muted2); }

  /* ── Order card ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: visible; }
  .card.ready { border-color: rgba(200,169,110,0.3); }
  .card.printing { border-color: rgba(91,155,213,0.3); }
  .card.shipping { border-color: rgba(76,175,125,0.3); }
  .card.failed { border-color: rgba(224,85,85,0.3); }

  .card-top { display: flex; gap: 12px; padding: 14px; }
  .card-thumb { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
  .card-thumb-placeholder { width: 64px; height: 64px; border-radius: 10px; background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .card-thumb-placeholder svg { width: 22px; height: 22px; stroke: var(--muted2); fill: none; stroke-width: 1.5; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .card-meta { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .badge-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 4px; }
  .badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 99px; white-space: nowrap; }
  .badge-style { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(200,169,110,0.2); }
  .badge-standard { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .badge-priority { background: var(--warning-dim); color: var(--warning); border: 1px solid rgba(224,168,85,0.2); }
  .badge-paid { background: var(--success-dim); color: var(--success); border: 1px solid rgba(76,175,125,0.2); }
  .badge-qty { background: var(--info-dim); color: var(--info); border: 1px solid rgba(91,155,213,0.2); }
  .badge-processing { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .card-addons { font-size: 11px; color: var(--muted); font-style: italic; }

  /* ── Shipping address block ── */
  .ship-block { margin: 0 14px 12px; background: var(--surface2); border-radius: 10px; padding: 10px 12px; }
  .ship-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 6px; }
  .ship-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .ship-addr { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .ship-copy-btn { font-size: 11px; color: var(--accent); background: none; border: none; cursor: pointer; font-family: inherit; padding: 4px 0 0; display: block; }

  /* ── Tracking field ── */
  .tracking-row { display: flex; gap: 8px; margin: 0 14px 12px; }
  .tracking-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 13px; font-family: inherit; color: var(--text); outline: none; transition: border-color 0.2s; }
  .tracking-input:focus { border-color: var(--accent); }
  .tracking-input::placeholder { color: var(--muted2); }
  .tracking-save-btn { padding: 10px 14px; border-radius: 10px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text); white-space: nowrap; transition: all 0.15s; }
  .tracking-save-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Sticker preview ── */
  .sticker-preview-wrap { padding: 0 14px 12px; }
  .sticker-img { width: auto; max-width: 100%; max-height: 320px; border-radius: 10px; display: block; margin: 0 auto; cursor: pointer; }

  /* ── Order total ── */
  .order-total { display: flex; align-items: center; justify-content: space-between; margin: 0 14px 12px; padding: 10px 12px; background: var(--surface2); border-radius: 10px; }
  .order-total-label { font-size: 12px; color: var(--muted); }
  .order-total-value { font-size: 15px; font-weight: 700; color: var(--accent); }

  /* ── Error notes ── */
  .error-notes { font-size: 11px; color: var(--error); background: var(--error-dim); border: 1px solid rgba(224,85,85,0.2); border-radius: 8px; padding: 8px 10px; margin: 0 14px 10px; line-height: 1.4; }

  /* ── Card actions ── */
  .card-actions { display: flex; gap: 8px; padding: 0 14px 14px; flex-wrap: wrap; }
  .btn { padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #0a0a0a; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-success { background: var(--success-dim); color: var(--success); border: 1px solid rgba(76,175,125,0.3); }
  .btn-warning { background: var(--warning-dim); color: var(--warning); border: 1px solid rgba(224,168,85,0.3); }
  .btn-danger { background: var(--error-dim); color: var(--error); border: 1px solid rgba(224,85,85,0.3); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Undo toast ── */
  .toast { position: fixed; bottom: 24px; left: 16px; right: 16px; max-width: 520px; margin: 0 auto; padding: 14px 18px; border-radius: 14px; background: var(--surface2); border: 1px solid var(--border); font-size: 14px; font-weight: 500; display: flex; align-items: center; justify-content: space-between; gap: 12px; transform: translateY(100px); opacity: 0; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s; z-index: 100; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .toast-msg { flex: 1; font-size: 13px; color: var(--text); }
  .toast-undo { background: var(--accent); color: #0a0a0a; border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; flex-shrink: 0; }

  /* ── Loading ── */
  #loadingState { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 14px; flex-direction: column; gap: 12px; }
  .spinner { width: 36px; height: 36px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error state ── */
  #errorState { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 40px; gap: 12px; }
  #errorState h2 { font-size: 18px; color: var(--text); }
  #errorState p { font-size: 13px; color: var(--muted); line-height: 1.6; }
</style>
</head>
<body>
<div id="app">

  <div id="loadingState">
    <div class="spinner"></div>
    <span>Loading fulfillment dashboard...</span>
  </div>

  <div id="errorState"></div>

  <div id="mainUI" style="display:none;flex-direction:column;height:100%;">

    <div class="header">
      <div class="header-left">
        <div class="logo">sticker.me</div>
        <div class="header-sub">Online Fulfillment</div>
      </div>
      <div class="header-stats">
        <div class="stat-pill">Today: <strong id="orderCountToday">0</strong></div>
        <div class="stat-pill">Revenue: <strong id="revenueToday">$0</strong></div>
        <div class="live-dot"></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabReady"     onclick="switchTab('ready')">
        Ready to Print <span class="tab-count" id="countReady">0</span>
      </button>
      <button class="tab"        id="tabPrinting"  onclick="switchTab('printing')">
        Printing <span class="tab-count" id="countPrinting">0</span>
      </button>
      <button class="tab"        id="tabShipping"  onclick="switchTab('shipping')">
        Ready to Ship <span class="tab-count" id="countShipping">0</span>
      </button>
      <button class="tab"        id="tabShipped"   onclick="switchTab('shipped')">
        Shipped <span class="tab-count" id="countShipped">0</span>
      </button>
      <button class="tab"        id="tabFailed"    onclick="switchTab('failed')">
        Failed <span class="tab-count" id="countFailed">0</span>
      </button>
    </div>

    <div class="card-list" id="cardList"></div>

  </div>

  <div class="toast" id="undoToast">
    <span class="toast-msg" id="undoMsg"></span>
    <button class="toast-undo" onclick="undoAction()">Undo</button>
  </div>

</div>
<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const KIOSK_API    = 'https://kiosk-api-production-0cdc.up.railway.app';
const SUPABASE_URL = 'https://oaghbtvdlouwhwjvrdct.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hZ2hidHZkbG91d2h3anZyZGN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NTM3MzUsImV4cCI6MjA5NzIyOTczNX0.nKBEsBb6rfa_1TPhl5mCXcxNcH_c_gM5aCsgeIyv_ZM';

const STYLE_NAMES = {
  western:'Western', samurai:'Samurai', spy:'Spy', tarot:'Tarot',
  hogwarts:'Hogwarts', royal:'Royal Portrait', ghibli:'Ghibli',
  jojo:"JoJo's Bizarre Adventure", fashion:'Fashion', princess:'Princess'
};

// ─── State ────────────────────────────────────────────────────────────────────
let currentTab  = 'ready';
let allOrders   = [];
let pollTimer   = null;
let undoTimer   = null;
let lastAction  = null; // { orderId, prevStatus }

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('loadingState').style.display = 'none';
  const ui = document.getElementById('mainUI');
  ui.style.display = 'flex';

  await poll();
  pollTimer = setInterval(poll, 5000);
}

// ─── Polling ──────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const today = new Date();
    today.setHours(0,0,0,0);
    const since = today.toISOString();

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/online_orders?created_at=gte.${since}&order=created_at.desc&select=*`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    if (!res.ok) return;
    const orders = await res.json();

    if (JSON.stringify(orders) !== JSON.stringify(allOrders)) {
      allOrders = orders;
      renderAll();
    }
  } catch(e) { /* silent */ }
}

// ─── Rendering ────────────────────────────────────────────────────────────────
function renderAll() {
  updateCounts();
  renderTab();
}

function updateCounts() {
  const ready    = allOrders.filter(o => o.fulfillment_status === 'READY_TO_PRINT' && o.status === 'GENERATED').length;
  const printing = allOrders.filter(o => o.fulfillment_status === 'PRINTING').length;
  const shipping = allOrders.filter(o => o.fulfillment_status === 'READY_TO_SHIP').length;
  const shipped  = allOrders.filter(o => o.fulfillment_status === 'SHIPPED' || o.fulfillment_status === 'DELIVERED').length;
  const failed   = allOrders.filter(o => o.status === 'FAILED' && o.fulfillment_status !== 'CANCELLED').length;

  // Also count processing in ready tab
  const processing = allOrders.filter(o => o.status === 'PROCESSING').length;

  document.getElementById('countReady').textContent    = ready + processing;
  document.getElementById('countPrinting').textContent = printing;
  document.getElementById('countShipping').textContent = shipping;
  document.getElementById('countShipped').textContent  = shipped;
  document.getElementById('countFailed').textContent   = failed;
  document.getElementById('orderCountToday').textContent = allOrders.length;

  // Revenue today
  const revenue = allOrders
    .filter(o => o.payment_status === 'PAID')
    .reduce((sum, o) => sum + (parseFloat(o.total) || 0), 0);
  document.getElementById('revenueToday').textContent = '$' + revenue.toFixed(2);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const tabId = 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1);
  document.getElementById(tabId)?.classList.add('active');
  renderTab();
}

function renderTab() {
  const list = document.getElementById('cardList');
  let orders = [];

  if (currentTab === 'ready') {
    orders = allOrders.filter(o =>
      (o.fulfillment_status === 'READY_TO_PRINT' && o.status === 'GENERATED') ||
      o.status === 'PROCESSING'
    );
  } else if (currentTab === 'printing') {
    orders = allOrders.filter(o => o.fulfillment_status === 'PRINTING');
  } else if (currentTab === 'shipping') {
    orders = allOrders.filter(o => o.fulfillment_status === 'READY_TO_SHIP');
  } else if (currentTab === 'shipped') {
    orders = allOrders.filter(o => o.fulfillment_status === 'SHIPPED' || o.fulfillment_status === 'DELIVERED');
  } else if (currentTab === 'failed') {
    orders = allOrders.filter(o => o.status === 'FAILED' && o.fulfillment_status !== 'CANCELLED');
  }

  if (orders.length === 0) {
    const msgs = {
      ready:    ['All clear!', 'No orders ready to print.'],
      printing: ['Nothing printing', 'Claim an order from Ready to Print.'],
      shipping: ['Nothing to ship', 'Printed orders will appear here.'],
      shipped:  ['No shipped orders today', 'Shipped orders appear here.'],
      failed:   ['No failures', 'All orders generated successfully.']
    };
    const [title, sub] = msgs[currentTab] || ['Empty', ''];
    list.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <p>${title}</p><small>${sub}</small>
    </div>`;
    return;
  }

  // Group orders by cart_id — orders sharing a cart ship together
  const grouped = groupByCart(orders);
  list.innerHTML = grouped.map(group => renderCartGroup(group)).join('');
}

function groupByCart(orders) {
  const groups = [];
  const seen = {};
  orders.forEach(o => {
    const key = o.cart_id || o.order_id; // solo orders use their own ID as key
    if (!seen[key]) { seen[key] = []; groups.push(seen[key]); }
    seen[key].push(o);
  });
  return groups;
}

function renderCartGroup(orders) {
  const isMulti = orders.length > 1;
  const cartId = orders[0].cart_id;
  const groupHeader = isMulti ? `
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--accent);padding:14px 14px 0;opacity:0.8;">
      &#128230; Cart — ${orders.length} items shipping together${cartId ? ' · ' + cartId : ''}
    </div>` : '';
  const cardsHtml = orders.map(o => renderCard(o, isMulti)).join('');
  if (!isMulti) return cardsHtml;
  return `<div style="background:var(--surface);border:1px solid rgba(200,169,110,0.3);border-radius:16px;overflow:hidden;margin-bottom:12px;">${groupHeader}${cardsHtml.replace(/margin-bottom:12px/g, 'margin-bottom:0').replace(/border-radius:16px/g, 'border-radius:0').replace(/border:1px solid var\(--border\)/g, 'border:none;border-top:1px solid var(--border)')}</div>`;
}

function renderCard(order, inGroup) {
  const isProcessing = order.status === 'PROCESSING';
  const isReady      = order.fulfillment_status === 'READY_TO_PRINT' && order.status === 'GENERATED';
  const isPrinting   = order.fulfillment_status === 'PRINTING';
  const isShipping   = order.fulfillment_status === 'READY_TO_SHIP';
  const isShipped    = order.fulfillment_status === 'SHIPPED' || order.fulfillment_status === 'DELIVERED';
  const isFailed     = order.status === 'FAILED';

  const styleName  = STYLE_NAMES[order.style] || order.style || '—';
  const timeStr    = formatTime(order.created_at);
  const qty        = order.quantity || 1;
  const total      = parseFloat(order.total || 0).toFixed(2);
  const isPriority = order.shipping_method === 'priority';

  const cardClass = isReady ? 'card ready' : isPrinting ? 'card printing' :
                    isShipping ? 'card shipping' : isFailed ? 'card failed' : 'card';

  // Badges
  let badges = `<span class="badge badge-style">${escHtml(styleName)}</span>`;
  badges += `<span class="badge badge-paid">✓ Paid</span>`;
  if (qty > 1) badges += `<span class="badge badge-qty">× ${qty} sheets</span>`;
  badges += `<span class="badge ${isPriority ? 'badge-priority' : 'badge-standard'}">${isPriority ? '⚡ Priority' : 'Standard'}</span>`;
  if (isProcessing) badges += `<span class="badge badge-processing">⏳ Generating...</span>`;

  // Thumbnail
  const thumb = order.photo_url
    ? `<img class="card-thumb" src="${order.photo_url}" alt="Customer photo" loading="lazy" />`
    : `<div class="card-thumb-placeholder"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>`;

  // Add-ons
  const addonsLine = order.style_addons
    ? `<div class="card-addons">✨ ${escHtml(order.style_addons)}</div>` : '';

  // Shipping address
  const addr2 = order.ship_address2 ? `${order.ship_address2}, ` : '';
  const fullAddress = `${order.ship_address1}, ${addr2}${order.ship_city}, ${order.ship_state} ${order.ship_zip}`;
  const shipBlock = `
    <div class="ship-block">
      <div class="ship-label">📦 Ship to</div>
      <div class="ship-name">${escHtml(order.ship_name || order.customer_name)}</div>
      <div class="ship-addr">${escHtml(order.ship_address1)}${order.ship_address2 ? '<br>' + escHtml(order.ship_address2) : ''}<br>${escHtml(order.ship_city)}, ${escHtml(order.ship_state)} ${escHtml(order.ship_zip)}</div>
      <button class="ship-copy-btn" onclick="copyAddress('${escAttr(fullAddress)}', '${escAttr(order.ship_name || order.customer_name)}')">Copy address</button>
    </div>`;

  // Sticker preview
  const stickerPreview = order.generated_image_url
    ? `<div class="sticker-preview-wrap"><img class="sticker-img" src="${order.generated_image_url}" alt="Sticker" onclick="openSticker('${order.generated_image_url}')" /></div>` : '';

  // Order total
  const orderTotalBlock = `
    <div class="order-total">
      <span class="order-total-label">${qty} × $9.99 + shipping</span>
      <span class="order-total-value">$${total}</span>
    </div>`;

  // Tracking field (show when ready to ship or shipped)
  const trackingBlock = (isShipping || isShipped)
    ? `<div class="tracking-row">
        <input type="text" class="tracking-input" id="track-${order.order_id}" placeholder="USPS tracking number (optional)" value="${escHtml(order.tracking_number || '')}" />
        <button class="tracking-save-btn" onclick="saveTracking('${order.order_id}')">Save</button>
      </div>` : '';

  // Error notes
  const errorNotes = isFailed && order.error_notes
    ? `<div class="error-notes">⚠️ ${escHtml(order.error_notes)}</div>` : '';

  // Actions
  let actions = '';
  if (currentTab === 'ready' && isReady) {
    actions = `
      <button class="btn btn-primary" onclick="claimPrint('${order.order_id}')">🖨 Print This</button>
      ${order.generated_image_url ? `<a class="btn btn-secondary" href="${order.generated_image_url}" download="${order.order_id}.png">↓ Download</a>` : ''}
      ${order.generated_image_url ? `<button class="btn btn-secondary" onclick="openSticker('${order.generated_image_url}')">View →</button>` : ''}
    `;
  } else if (currentTab === 'ready' && isProcessing) {
    actions = `<button class="btn btn-secondary" disabled>⏳ Generating sticker...</button>`;
  } else if (currentTab === 'printing') {
    actions = `
      <button class="btn btn-success" onclick="markReadyToShip('${order.order_id}')">✓ Done Printing</button>
      ${order.generated_image_url ? `<a class="btn btn-secondary" href="${order.generated_image_url}" download="${order.order_id}.png">↓ Download</a>` : ''}
      <button class="btn btn-secondary" onclick="unclaimPrint('${order.order_id}')">← Back</button>
    `;
  } else if (currentTab === 'shipping') {
    actions = `
      <button class="btn btn-primary" onclick="markShipped('${order.order_id}')">📬 Mark Shipped</button>
      <button class="btn btn-secondary" onclick="unclaimPrint('${order.order_id}')">← Back to Print</button>
    `;
  } else if (currentTab === 'shipped') {
    actions = `
      ${order.generated_image_url ? `
        <button class="btn btn-secondary" onclick="claimPrint('${order.order_id}')">🖨 Reprint</button>
        <a class="btn btn-secondary" href="${order.generated_image_url}" download="${order.order_id}.png">↓ Download</a>
      ` : ''}
    `;
  } else if (currentTab === 'failed') {
    actions = `
      <button class="btn btn-warning" onclick="reprocess('${order.order_id}')">↺ Reprocess</button>
      <button class="btn btn-danger"  onclick="cancelOrder('${order.order_id}')">Cancel</button>
    `;
  }

  return `
    <div class="card ${cardClass}" id="card-${order.order_id}">
      <div class="card-top">
        ${thumb}
        <div class="card-info">
          <div class="card-name">${escHtml(order.customer_name || 'Guest')}</div>
          <div class="card-meta">${order.order_id} · ${timeStr} · ${escHtml(order.customer_email || '')}</div>
          <div class="badge-row">${badges}</div>
          ${addonsLine}
        </div>
      </div>
      ${shipBlock}
      ${orderTotalBlock}
      ${stickerPreview}
      ${trackingBlock}
      ${errorNotes}
      <div class="card-actions">${actions}</div>
    </div>
  `;
}

// ─── Actions ──────────────────────────────────────────────────────────────────
async function claimPrint(orderId) {
  try {
    await patch(orderId, { fulfillment_status: 'PRINTING' });
    await poll();
  } catch(e) { alert('Could not claim order. Try again.'); }
}

async function unclaimPrint(orderId) {
  try {
    await patch(orderId, { fulfillment_status: 'READY_TO_PRINT' });
    await poll();
  } catch(e) { alert('Could not unclaim order. Try again.'); }
}

async function markReadyToShip(orderId) {
  try {
    lastAction = { orderId, prevStatus: 'PRINTING' };
    await patch(orderId, { fulfillment_status: 'READY_TO_SHIP' });
    await poll();
    showUndoToast(orderId, 'Moved to Ready to Ship.');
    switchTab('shipping');
  } catch(e) { alert('Could not update order. Try again.'); }
}

async function markShipped(orderId) {
  try {
    const trackingEl = document.getElementById(`track-${orderId}`);
    const tracking = trackingEl?.value.trim() || null;
    lastAction = { orderId, prevStatus: 'READY_TO_SHIP' };

    // Find all orders in the same cart and mark them all shipped
    const order = allOrders.find(o => o.order_id === orderId);
    const cartId = order?.cart_id;
    const toShip = cartId
      ? allOrders.filter(o => o.cart_id === cartId && o.fulfillment_status === 'READY_TO_SHIP')
      : [{ order_id: orderId }];

    await Promise.all(toShip.map(o => patch(o.order_id, {
      fulfillment_status: 'SHIPPED',
      tracking_number: tracking,
      shipped_at: new Date().toISOString()
    })));

    await poll();
    showUndoToast(orderId, toShip.length > 1 ? `${toShip.length} items marked shipped!` : 'Marked as shipped!');
    switchTab('shipped');
  } catch(e) { alert('Could not mark as shipped. Try again.'); }
}

async function saveTracking(orderId) {
  try {
    const trackingEl = document.getElementById(`track-${orderId}`);
    const tracking = trackingEl?.value.trim() || null;
    await patch(orderId, { tracking_number: tracking });
    const btn = trackingEl?.nextElementSibling;
    if (btn) { btn.textContent = 'Saved!'; setTimeout(() => btn.textContent = 'Save', 2000); }
  } catch(e) { alert('Could not save tracking. Try again.'); }
}

async function undoAction() {
  if (!lastAction) return;
  hideUndoToast();
  try {
    await patch(lastAction.orderId, { fulfillment_status: lastAction.prevStatus });
    lastAction = null;
    await poll();
  } catch(e) { alert('Could not undo. Try again.'); }
}

async function reprocess(orderId) {
  try {
    const res = await fetch(`${KIOSK_API}/online-reprocess`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderId })
    });
    if (!res.ok) throw new Error();
    await poll();
  } catch(e) { alert('Could not reprocess. Try again.'); }
}

async function cancelOrder(orderId) {
  if (!confirm('Cancel this order? This cannot be undone.')) return;
  try {
    await patch(orderId, { fulfillment_status: 'CANCELLED', status: 'FAILED' });
    await poll();
  } catch(e) { alert('Could not cancel. Try again.'); }
}

function openSticker(url) { window.open(url, '_blank'); }

async function copyAddress(address, name) {
  const full = `${name}\n${address}`;
  try {
    await navigator.clipboard.writeText(full);
    showUndoToast(null, 'Address copied!', false);
  } catch(e) {
    prompt('Copy this address:', full);
  }
}

// ─── Supabase helper ──────────────────────────────────────────────────────────
async function patch(orderId, body) {
  body.updated_at = new Date().toISOString();
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/online_orders?order_id=eq.${encodeURIComponent(orderId)}`,
    {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json', 'Prefer': 'return=minimal'
      },
      body: JSON.stringify(body)
    }
  );
  if (!res.ok) throw new Error(await res.text());
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function showUndoToast(orderId, msg, showUndo = true) {
  document.getElementById('undoMsg').textContent = msg;
  document.getElementById('undoToast').querySelector('.toast-undo').style.display = showUndo ? 'block' : 'none';
  document.getElementById('undoToast').classList.add('show');
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(() => {
    hideUndoToast();
    if (!showUndo) lastAction = null;
  }, 5000);
}

function hideUndoToast() {
  document.getElementById('undoToast').classList.remove('show');
  if (undoTimer) clearTimeout(undoTimer);
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function formatTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(str) {
  return String(str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
